name: Build All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      build_number:
        description: "Build number"
        required: true
        default: "1"

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.13"
  BUILD_VERSION: ${{ inputs.build_version || '1.0.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '1' }}

