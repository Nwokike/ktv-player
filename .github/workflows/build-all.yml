name: Build All Platforms

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version"
        required: true
        default: "1.1.0"
      build_number:
        description: "Build number"
        required: true
        default: "4"

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.13"
  BUILD_VERSION: ${{ inputs.build_version || '1.1.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '3' }}

jobs:
  # ─── Windows (Automated .exe Installer) ────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      
      - name: Build Windows Portable
        run: uv run flet build windows --yes --project ktv --product "KTV Player" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
        
      - name: Generate Icon for Installer
        run: |
          uv pip install pillow
          uv run python -c "from PIL import Image; Image.open('src/assets/icon.png').save('src/assets/icon.ico', format='ICO', sizes=[(256, 256)])"

      - name: Build Windows Installer (Inno Setup)
        run: |
          $IssContent = @"
          [Setup]
          AppId={{7B132174-8745-4B95-8F9B-983C66986F12}}
          AppName=KTV Player
          AppVersion=${{ env.BUILD_VERSION }}
          AppPublisher=Kiri
          AppPublisherURL=https://kiri.ng
          AppSupportURL=https://kiri.ng/support
          AppUpdatesURL=https://kiri.ng/updates
          AppCopyright=Copyright (C) 2026 Kiri
          DefaultDirName={autopf}\KTV Player
          DefaultGroupName=KTV Player
          OutputDir=.\build\installer
          OutputBaseFilename=KTV_Player_Setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          PrivilegesRequired=lowest
          SetupIconFile=.\src\assets\icon.ico
          UninstallDisplayIcon={app}\ktv.exe
          CloseApplications=yes
          AppMutex=KTVPlayer_Mutex

          [Files]
          Source: "build\windows\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\KTV Player"; Filename: "{app}\ktv.exe"
          Name: "{autodesktop}\KTV Player"; Filename: "{app}\ktv.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked
          "@
          Set-Content -Path "installer.iss" -Value $IssContent -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: windows-installer
          path: build/installer/KTV_Player_Setup.exe
          
  # ─── Android APK (universal) ───────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > upload-key.jks
      - name: Build APK (universal)
        env:
          FLET_ANDROID_SIGNING_KEY_STORE: ${{ github.workspace }}/upload-key.jks
          FLET_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: uv run flet build apk --yes --project ktv --product "KTV Player" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: apk-universal
          path: build/apk/

  # ─── Android APK (split per ABI) ───────────────────────
  build-apk-split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > upload-key.jks
      - name: Build APK (split per ABI)
        env:
          FLET_ANDROID_SIGNING_KEY_STORE: ${{ github.workspace }}/upload-key.jks
          FLET_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: uv run flet build apk --yes --project ktv --product "KTV Player" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} --split-per-abi -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: apk-split-abi
          path: build/apk/

  # ─── Android AAB (Play Store) ──────────────────────────
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > upload-key.jks
      - name: Build AAB
        env:
          FLET_ANDROID_SIGNING_KEY_STORE: ${{ github.workspace }}/upload-key.jks
          FLET_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: uv run flet build aab --yes --project ktv --product "KTV Player" --org ng.kiri --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: aab-playstore
          path: build/aab/
